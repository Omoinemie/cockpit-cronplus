name: Build & Release

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Confirm build?'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm
        if: ${{ !inputs.confirm }}
        run: |
          echo "ERROR: You must confirm the build"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Get version
        id: ver
        run: |
          VER="$(cat VERSION | tr -d '[:space:]')"
          echo "v=${VER}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: bash build-deb.sh

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.v }}
          name: v${{ steps.ver.outputs.v }}
          files: |
            release/cronplus_${{ steps.ver.outputs.v }}_all.deb
            release/cockpit-cronplus_${{ steps.ver.outputs.v }}_all.deb
          body: |
            ## cockpit-cronplus v${{ steps.ver.outputs.v }}

            ```bash
            sudo dpkg -i cronplus_${{ steps.ver.outputs.v }}_all.deb
            sudo dpkg -i cockpit-cronplus_${{ steps.ver.outputs.v }}_all.deb
            ```

      - name: Commit version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION daemon/src/version.py webui/manifest.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Build version $(cat VERSION)"
          git push
