name: Build & Release

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: '是否发布到 Release (Yes/No)'
        type: boolean
        required: true
        default: true

jobs:
  build:
    name: Build for ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [amd64, arm64]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Determine version
        id: version
        # 仅从文件读取版本
        run: |
          VER=$(cat VERSION | tr -d '[:space:]')
          echo "ver=${VER}" >> "$GITHUB_OUTPUT"

      - name: Build & Package
        run: |
          chmod +x build-deb.sh
          # 第一个参数直接传架构，版本号由脚本内部读取
          bash build-deb.sh ${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cronplus-${{ steps.version.outputs.ver }}-${{ matrix.arch }}
          path: dist/${{ matrix.arch }}/
          retention-days: 30

      - name: Create Release
        if: ${{ github.event.inputs.create_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.ver }}
          name: v${{ steps.version.outputs.ver }}
          files: |
            dist/${{ matrix.arch }}/cronplus_*.deb
            dist/${{ matrix.arch }}/cockpit-cronplus_*.deb
            dist/${{ matrix.arch }}/SHA256SUMS
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
