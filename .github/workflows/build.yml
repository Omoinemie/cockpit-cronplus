name: Build Deb Packages

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - none

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cockpit-cronplus
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y dpkg-deb

      - name: Bump version
        if: github.event.inputs.bump != 'none'
        run: |
          VERSION="$(cat VERSION | tr -d '[:space:]')"
          MAJOR="$(echo "${VERSION}" | cut -d. -f1)"
          MINOR="$(echo "${VERSION}" | cut -d. -f2)"
          PATCH="$(echo "${VERSION}" | cut -d. -f3)"

          case "${{ github.event.inputs.bump }}" in
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            *)     PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "${NEW_VERSION}" > VERSION
          echo "Bumped to: ${NEW_VERSION}"

      - name: Build packages
        run: bash build-deb.sh

      - name: Read built version
        id: built
        run: |
          NEXT="$(cat VERSION | tr -d '[:space:]')"
          MAJOR="$(echo "${NEXT}" | cut -d. -f1)"
          MINOR="$(echo "${NEXT}" | cut -d. -f2)"
          PATCH="$(echo "${NEXT}" | cut -d. -f3)"
          BUILT="${MAJOR}.${MINOR}.$((PATCH - 1))"
          echo "version=${BUILT}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.built.outputs.version }}
          name: v${{ steps.built.outputs.version }}
          files: |
            cockpit-cronplus/cronplus_${{ steps.built.outputs.version }}_all.deb
            cockpit-cronplus/cockpit-cronplus_${{ steps.built.outputs.version }}_all.deb
          body: |
            ## cockpit-cronplus v${{ steps.built.outputs.version }}

            ```bash
            sudo dpkg -i cronplus_${{ steps.built.outputs.version }}_all.deb
            sudo dpkg -i cockpit-cronplus_${{ steps.built.outputs.version }}_all.deb
            ```
          draft: false
          prerelease: false

      - name: Commit version bump
        if: github.event.inputs.bump != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to v$(cat VERSION | tr -d '[:space:]')"
          git push
