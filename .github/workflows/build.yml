name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (留空则读取 VERSION 文件)'
        required: false
        default: ''
      create_release:
        description: '是否发布到 Release (Yes/No)'
        type: boolean
        required: true
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            # 即使这里写了文件，build-deb.sh 也会通过参数再次确认同步
            echo "ver=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            VER=$(cat VERSION | tr -d '[:space:]')
            echo "ver=${VER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & Package
        run: |
          chmod +x build-deb.sh
          # 将确定的版本号作为第一个参数传递给脚本
          bash build-deb.sh ${{ steps.version.outputs.ver }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cronplus-${{ steps.version.outputs.ver }}
          path: dist/
          retention-days: 30

      - name: Create Release
        if: ${{ github.event.inputs.create_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.ver }}
          name: v${{ steps.version.outputs.ver }}
          files: |
            dist/cronplus_*.deb
            dist/cockpit-cronplus_*.deb
            dist/SHA256SUMS
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
