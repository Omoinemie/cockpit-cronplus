name: Build & Release

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Confirm build?'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cockpit-cronplus

    steps:
      - name: Confirm
        # 注意：boolean 类型在判断时需要使用 true/false（不带引号）
        if: github.event.inputs.confirm != 'true'
        run: |
          echo "ERROR: You must check the confirm box to proceed"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dpkg-deb
        run: sudo apt-get update && sudo apt-get install -y dpkg-deb

      - name: Build
        run: bash build-deb.sh

      - name: Get version
        id: ver
        run: |
          NEXT="$(cat VERSION | tr -d '[:space:]')"
          MAJOR="$(echo "$NEXT" | cut -d. -f1)"
          MINOR="$(echo "$NEXT" | cut -d. -f2)"
          PATCH="$(echo "$NEXT" | cut -d. -f3)"
          BUILT="${MAJOR}.${MINOR}.$((PATCH-1))"
          echo "v=${BUILT}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.v }}
          name: v${{ steps.ver.outputs.v }}
          files: |
            cockpit-cronplus/cronplus_${{ steps.ver.outputs.v }}_all.deb
            cockpit-cronplus/cockpit-cronplus_${{ steps.ver.outputs.v }}_all.deb
          body: |
            ## cockpit-cronplus v${{ steps.ver.outputs.v }}

            ```bash
            sudo dpkg -i cronplus_${{ steps.ver.outputs.v }}_all.deb
            sudo dpkg -i cockpit-cronplus_${{ steps.ver.outputs.v }}_all.deb
            ```

      - name: Commit version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION daemon/src/version.py webui/manifest.json
          git commit -m "chore: v$(cat VERSION | tr -d '[:space:]')"
          git push
