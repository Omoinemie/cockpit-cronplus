name: Apply Patch

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 配置 Git 用户信息
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: 应用根目录下的 patch 文件
        run: |
          for patch in *.patch; do
            [ -f "$patch" ] || continue
            echo "正在应用: $patch"
            if git apply --check "$patch" 2>/dev/null; then
              echo "使用 git apply 应用"
              git apply "$patch"
              git add -A
              git commit -m "应用补丁: $patch"
            elif git am "$patch" 2>/dev/null; then
              echo "使用 git am 应用"
            else
              echo "错误: 无法应用 $patch"
              exit 1
            fi
          done

      - name: 推送
        run: git push
