name: Apply Patch

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 配置 Git 用户信息
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: 应用根目录下的 patch 文件
        run: |
          for patch in *.patch; do
            [ -f "$patch" ] || continue
            echo "正在应用: $patch"
            if ! git am "$patch"; then
              echo "git am 失败，尝试 git apply"
              git am --abort
              git apply "$patch"
            fi
          done

      - name: 提交并推送
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "没有新的变更需要提交"
          else
            git commit -m "应用补丁文件"
            git push
          fi
